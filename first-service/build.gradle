plugins {
    id 'java'
    id 'war'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'org.lovesoa'
version = '0.0.1-SNAPSHOT'
description = 'soa'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework:spring-framework-bom:6.1.10'
        mavenBom 'org.springframework.data:spring-data-bom:2023.1.6'
    }
}

configurations {
    all {
        exclude group: 'com.sun.faces', module: 'jsf-impl'
        exclude group: 'com.sun.jsf-jsftemplating', module: 'jsf-jsftemplating'
        exclude group: 'org.glassfish', module: 'jakarta.faces'
    }
}

dependencies {
    // ==========================
    // Spring Framework
    // ==========================
    implementation 'org.springframework:spring-webmvc'
    implementation 'org.springframework:spring-context'
    implementation 'org.springframework:spring-web'
    implementation 'org.springframework:spring-orm'

    // ==========================
    // Spring Data JPA
    // ==========================
    implementation 'org.springframework.data:spring-data-jpa'

    // ==========================
    // JPA / Hibernate
    // ==========================
    implementation 'org.hibernate.orm:hibernate-core:6.4.4.Final'
    runtimeOnly 'org.postgresql:postgresql:42.7.4'

    // ==========================
    // QueryDSL
    // ==========================
    implementation 'com.querydsl:querydsl-jpa:5.1.0'
    annotationProcessor 'com.querydsl:querydsl-apt:5.1.0:jakarta'
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api:3.0.0'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api:3.1.0'

    // ==========================
    // Bean Validation
    // ==========================
    implementation 'jakarta.validation:jakarta.validation-api:3.0.2'
    implementation 'org.hibernate.validator:hibernate-validator:8.0.1.Final'

    // ==========================
    // Lombok
    // ==========================
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    // ==========================
    // JWT
    // ==========================
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    // ==========================
    // Servlet API (provided by Payara)
    // ==========================
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    compileOnly 'jakarta.servlet.jsp:jakarta.servlet.jsp-api:3.0.0'

    // ==========================
    // Spring Security
    // ==========================
    implementation 'org.springframework.security:spring-security-web:6.1.6'
    implementation 'org.springframework.security:spring-security-config:6.1.6'
    implementation 'org.springframework.security:spring-security-core:6.1.6'

    // ==========================
    // Jackson
    // ==========================
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.17.1'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.1'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.1'

    // ==========================
    // SLF4J
    // ==========================
    implementation 'org.slf4j:slf4j-api:2.0.13'
    implementation 'org.slf4j:slf4j-simple:2.0.13'

    // ==========================
    // SpringDoc OpenAPI - УБРАТЬ пока не заработает базовая сборка
    // ==========================
    // implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'
    // implementation 'org.springframework.hateoas:spring-hateoas:2.2.0'
}

// Настройка для QueryDSL
def querydslDir = layout.buildDirectory.dir("generated/sources/annotationProcessor/java/main").get().asFile

sourceSets {
    main.java.srcDirs += querydslDir
}

tasks.withType(JavaCompile) {
    options.annotationProcessorGeneratedSourcesDirectory = file(querydslDir)
}

clean {
    delete querydslDir
}

// Отключаем unit-тесты
tasks.withType(Test) {
    enabled = false
}

// Настройка WAR
tasks.named('war') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveFileName.set('first-service.war')

    from('src/main/webapp') {
        include 'WEB-INF/web.xml'
        include 'WEB-INF/glassfish-web.xml'
        include 'WEB-INF/beans.xml'
        into 'WEB-INF'
    }
}